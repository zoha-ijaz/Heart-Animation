<!DOCTYPE html>
<html>
<head>
    <title>Heart Animation</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        svg { display: none; }
    </style>
</head>
<body>

<svg viewBox="0 0 100 100">
    <!-- Heart path -->
    <path id="path" d="M50,90 C10,50 0,30 20,15 A20,20 0 0,1 50,30 A20,20 0 0,1 80,15 C100,30 90,50 50,90" />
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true }); // Antialias on kiya hai
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const path = document.querySelector("#path");
    const length = path.getTotalLength();
    const tl = gsap.timeline();

    // Loop steps 0.1 rakha hai, performance aur quality ka balance
    for (let i = 0; i < length; i += 0.1) {
        const point = path.getPointAtLength(i);
       // Vector lines ko aise edit karein
const vector = new THREE.Vector3((point.x - 50) * 0.7, (50 - point.y) * 0.7, 0);
        
        // Randomness (noise) kam ki hai taake dil ki shape bani rahe
        vector.x += (Math.random() - 0.5) * 2; 
        vector.y += (Math.random() - 0.5) * 2;
        vector.z += (Math.random() - 0.5) * 5;

        // Particle size chhota (0.08) kiya hai
        const geometry = new THREE.SphereGeometry(0.08); 
        const material = new THREE.MeshBasicMaterial({color: 0xff69b4});
        const mesh = new THREE.Mesh(geometry, material);
        
        // Starting point (center)
        mesh.position.set(0, 0, 0); 
        scene.add(mesh);

        // Animation
        tl.to(mesh.position, {
            x: vector.x,
            y: vector.y,
            z: vector.z,
            duration: Math.random() * 2 + 1,
            ease: "power2.out"
        }, 0);
    }

    camera.position.z = 60; // Camera thoda kareeb kiya hai
    
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
